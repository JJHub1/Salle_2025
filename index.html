<style>
  :root{--bg:#0a0e1a;--panel:#111727;--panel2:#0d1320;--line:#1e2740;--band:#0f1524;--bandbrd:#1c2540;
    --txt:#e8ecf5;--muted:#8a94ad;--dim:#5b6480;--hi:#34d399;--mid:#fbbf24;--lo:#f87171;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;height:58px;z-index:30;display:flex;align-items:center;gap:16px;
    padding:0 20px;background:#0b1020;border-bottom:1px solid var(--line)}
  header h1{font-size:15px;font-weight:600;margin:0;white-space:nowrap}
  header h1 b{color:var(--hi)}
  header h1 .tag{color:var(--dim);font-weight:500;font-size:11.5px;border:1px solid var(--line);padding:2px 8px;border-radius:6px;margin-left:8px}
  .kpis{display:flex;gap:16px;margin-left:6px}
  .kpi{font-size:12px;color:var(--muted);white-space:nowrap}
  .kpi b{color:var(--txt);font-size:15px;font-weight:700;margin-right:3px}
  .kpi.conv b{color:var(--hi)}
  .spacer{flex:1}
  #search{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 11px;font-size:12.5px;width:160px;outline:none}
  #search::placeholder{color:var(--dim)}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
  .seg button{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:5px 11px;border-radius:7px;cursor:pointer;white-space:nowrap}
  .seg button:hover{color:var(--txt)}
  .seg button.on{color:#0a0e1a}
  .seg button.on.all{background:#c3cadb}
  .seg button.on.closed{background:var(--hi)}
  .seg button.on.open{background:var(--lo)}
  #detail{position:fixed;top:58px;left:0;right:0;height:120px;z-index:20;background:#0d1320;border-bottom:1px solid var(--line);padding:13px 20px;overflow:hidden}
  .d-row{display:flex;gap:20px;align-items:stretch;height:100%}
  .d-left{display:flex;gap:14px;align-items:center;flex-shrink:0;max-width:50%}
  .d-chips{display:flex;flex-direction:column;gap:6px;min-width:150px}
  .d-chips .t{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;max-width:320px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:14px;font-size:11.5px;font-weight:600;background:#161d30;border:1px solid var(--line);cursor:default;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .gl{font-size:9px;font-weight:800;letter-spacing:.4px;opacity:.85}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:700;margin-left:2px}
  .chip .x:hover{color:#fff}
  .d-stats{display:flex;gap:9px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 13px;text-align:center;min-width:66px}
  .stat .n{font-size:18px;font-weight:800;line-height:1}
  .stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .d-conn{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .d-conn .hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  .d-pills{display:flex;gap:7px;flex-wrap:wrap;overflow-y:auto;align-content:flex-start}
  .d-grp{display:flex;align-items:center;gap:6px}
  .d-grp .gl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:1px}
  .p-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:16px;font-size:12px;cursor:pointer;background:var(--panel);border:1px solid var(--line);color:#c3cadb;white-space:nowrap;max-width:360px;overflow:hidden;text-overflow:ellipsis}
  .p-pill:hover{border-color:#34406a;color:var(--txt)}
  .p-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .p-pill .pw{font-size:10px;color:var(--dim)}
  .d-idle{display:flex;align-items:center;gap:24px;color:var(--muted);font-size:13px;height:100%}
  .d-idle .big{font-size:15px;color:var(--txt);font-weight:600}
  .d-idle .lg{display:flex;gap:13px;align-items:center;font-size:11.5px;flex-wrap:wrap}
  .d-idle .it{display:flex;align-items:center;gap:6px}
  .d-idle .sw{width:18px;height:5px;border-radius:3px}
  .d-close{position:absolute;top:9px;right:15px;cursor:pointer;color:var(--muted);font-size:20px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;z-index:2}
  .d-close:hover{background:var(--panel);color:var(--txt)}
  #graph{position:fixed;top:179px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden}
  svg{display:block}
  .band-box{fill:var(--band);stroke:var(--bandbrd);stroke-width:1}
  .band-label{font-size:11.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
  .band-desc{fill:#56607e;font-size:11px}
  .plink{fill:none;stroke:#f472b6;stroke-opacity:.45;stroke-width:1.2px}
  .spine{fill:none;stroke:#e8ecf5;stroke-opacity:.55;stroke-width:2px;stroke-dasharray:1 0}
  .node{cursor:pointer}
  .node .pill{stroke-width:1.5px;transition:stroke-width .15s}
  .node .lbl{fill:#f3f6fc;font-size:12px;font-weight:600;pointer-events:none}
  .node .cnt{font-size:14px;font-weight:800;pointer-events:none;text-anchor:middle;fill:#fff;paint-order:stroke;stroke:#0a0e1a;stroke-width:3px}
  .node .track{fill:#ffffff14}
  .node.dim{opacity:.16}
  .node.active .pill{stroke-width:3.5px}
  #graph::-webkit-scrollbar{width:10px}
  #graph::-webkit-scrollbar-thumb{background:#1c2540;border-radius:5px}
</style>
</head>

<style>
  #login-gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#16203a 0%,var(--bg) 60%)}
  #login-gate.ok{display:none}
  .lg-card{width:320px;max-width:90vw;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
  .lg-card h2{margin:0 0 4px;font-size:17px;font-weight:700;color:var(--txt)}
  .lg-card h2 b{color:var(--hi)}
  .lg-card .sub{margin:0 0 20px;font-size:12px;color:var(--muted)}
  .lg-card input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:11px 13px;font-size:14px;outline:none;text-align:center;letter-spacing:2px}
  .lg-card input:focus{border-color:var(--hi)}
  .lg-card button{width:100%;margin-top:12px;background:var(--hi);color:#0a0e1a;border:none;
    border-radius:10px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer}
  .lg-card button:hover{filter:brightness(1.08)}
  .lg-err{margin-top:12px;min-height:16px;font-size:12px;color:var(--lo);font-weight:600}
</style>
<div id="login-gate">
  <div class="lg-card">
    <h2>Histórico de Propostas <b>SALLE</b></h2>
    <p class="sub">Acesso restrito · Uso interno</p>
    <input id="lg-pass" type="password" placeholder="Senha" autocomplete="off" autofocus>
    <button id="lg-btn">Entrar</button>
    <div class="lg-err" id="lg-err"></div>
  </div>
</div>
<script>
  (function(){
    var SENHA = "465";
    var gate = document.getElementById("login-gate");
    var inp  = document.getElementById("lg-pass");
    var btn  = document.getElementById("lg-btn");
    var err  = document.getElementById("lg-err");
    // Já autenticado nesta aba? libera direto.
    if(sessionStorage.getItem("salle_ok") === "1"){ gate.classList.add("ok"); }
    function tentar(){
      if(inp.value === SENHA){
        sessionStorage.setItem("salle_ok","1");
        gate.classList.add("ok");
      } else {
        err.textContent = "Senha incorreta.";
        inp.value = ""; inp.focus();
      }
    }
    btn.addEventListener("click", tentar);
    inp.addEventListener("keydown", function(e){ if(e.key === "Enter") tentar(); });
  })();
</script>
<!-- ===== Fim da tela de acesso ===== -->

};
const DEPTCOLOR={"Estudos":"#5b9dff","Projetos":"#a78bfa","Outros":"#fb923c"};
function colorOf(n){
  if(n.band==="status")return n.id==="S:Fechada"?"#34d399":"#f87171";
  if(n.band==="dept")  return DEPTCOLOR[n.label]||"#5b9dff";
  return BANDMETA[n.band].color;
}
function tier(r){return r>=.45?"#34d399":r>=.30?"#fbbf24":"#f87171";}

const NODES=DATA.nodes.map(n=>({...n}));
DATA.propostas.forEach(p=>NODES.push({id:p.id,band:"proposta",label:p.num,p:p}));
NODES.forEach(n=>n.color=colorOf(n));
const nodeById=new Map(NODES.map(n=>[n.id,n]));

function wrap(s){
  const words=String(s).split(/\s+/);const lines=[];let cur="";
  for(const w of words){if((cur+" "+w).trim().length>32){if(cur)lines.push(cur);cur=w;}else cur=(cur?cur+" ":"")+w;}
  if(cur)lines.push(cur);return lines.length?lines.slice(0,6):[String(s)];
}
NODES.forEach(n=>{
  n.lines=wrap(n.label);
  const longest=Math.max(...n.lines.map(l=>l.length));
  n.w=Math.min(300,Math.max(82,longest*7+30));
  n.h=Math.max(50,n.lines.length*15+40);
  n.cr=Math.hypot(n.w,n.h)/2+6;
});
const plinks=DATA.propostas.map(p=>({s:nodeById.get(p.id),t:nodeById.get(p.cli)}));

document.getElementById("k-total").textContent=DATA.total;

/* ====== state ====== */
let MODE="all";
const facets={dept:null,cidade:null,escopo:null,cliente:null};
let selProp=null;
function anyFacet(){return facets.dept||facets.cidade||facets.escopo||facets.cliente;}
function propStatus(p){return MODE==="all"?true:MODE==="closed"?p.fech:!p.fech;}
function propMatch(p,except){
  if(!propStatus(p))return false;
  for(const b of FB){if(b===except)continue;if(facets[b]&&p[KEY[b]]!==facets[b])return false;}
  return true;
}
function countFor(n){
  let tot=0,cl=0;
  if(n.band==="status"){
    for(const p of DATA.propostas){let ok=true;
      for(const b of FB)if(facets[b]&&p[KEY[b]]!==facets[b]){ok=false;break;}
      if(ok&&p.st===n.id){tot++;if(p.fech)cl++;}}
  }else{
    const k=KEY[n.band];
    for(const p of DATA.propostas){if(propMatch(p,n.band)&&p[k]===n.id){tot++;if(p.fech)cl++;}}
  }
  return [tot,cl];
}

}
function drawBands(){
  const data=ACTIVE.map(b=>({cat:b,...bands[b]}));
  const sel=gBands.selectAll("g.band").data(data,d=>d.cat);sel.exit().remove();
  const ent=sel.enter().append("g").attr("class","band");
  ent.append("rect").attr("class","band-box").attr("rx",14);
  ent.append("text").attr("class","band-label");ent.append("text").attr("class","band-desc");
  const all=ent.merge(sel);
  all.select("rect.band-box").attr("x",PAD).attr("y",d=>d.y0).attr("width",W-PAD*2).attr("height",d=>d.h);
  all.select("text.band-label").attr("x",PAD+18).attr("y",d=>d.y0+22).attr("fill",d=>BANDMETA[d.cat].color).text(d=>BANDMETA[d.cat].label);
  all.select("text.band-desc").attr("x",d=>PAD+18+BANDMETA[d.cat].label.length*8.6+16).attr("y",d=>d.y0+22).text(d=>BANDMETA[d.cat].desc);
}

const sim=d3.forceSimulation(NODES)
  .force("charge",d3.forceManyBody().strength(-40))
  .force("x",d3.forceX(W/2).strength(.02))
  .force("y",d3.forceY(d=>bands[d.band]?bands[d.band].cy:0).strength(.6))
  .force("collide",d3.forceCollide(d=>d._vis?d.cr:0).strength(1))
  .on("tick",tick);

function curve(x1,y1,x2,y2){const my=(y1+y2)/2;return `M${x1},${y1} C ${x1},${my} ${x2},${my} ${x2},${y2}`;}
let plink=gPlinks.selectAll("path").data(plinks).join("path").attr("class","plink").style("display","none");
let spine=gSpine.append("path").attr("class","spine").style("display","none");

let node=gNodes.selectAll("g").data(NODES).join("g").attr("class","node")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on("click",(e,d)=>{e.stopPropagation();clickNode(d);});
node.append("rect").attr("class","pill")
  .attr("x",d=>-d.w/2).attr("y",d=>-d.h/2).attr("width",d=>d.w).attr("height",d=>d.h).attr("rx",10)
  .attr("fill",d=>d.color).attr("fill-opacity",.16).attr("stroke",d=>d.color);
node.each(function(d){const g=d3.select(this);const sy=-d.h/2+13;
  d.lines.forEach((ln,i)=>g.append("text").attr("class","lbl").attr("x",-d.w/2+12).attr("y",sy+i*15).text(ln));});
const trackW=d=>d.w-24,trackX=d=>-d.w/2+12,barY=d=>d.h/2-23;
node.append("rect").attr("class","track").attr("x",trackX).attr("y",barY).attr("width",trackW).attr("height",4).attr("rx",2);
node.append("rect").attr("class","fill").attr("x",trackX).attr("y",barY).attr("height",4).attr("rx",2);
node.append("text").attr("class","cnt").attr("x",0).attr("y",d=>d.h/2-7);

let spineNodes=[];
function tick(){
  NODES.forEach(d=>{if(!d._vis)return;const b=bands[d.band];if(!b)return;
    d.y=Math.max(b.y0+30+d.h/2,Math.min(b.y1-d.h/2-6,d.y));
    d.x=Math.max(PAD+d.w/2+12,Math.min(W-PAD-d.w/2-12,d.x));});
  plink.attr("d",p=>curve(p.s.x,p.s.y,p.t.x,p.t.y));
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
  if(spineNodes.length>1){
    let d="";for(let i=0;i<spineNodes.length-1;i++){const a=spineNodes[i],b=spineNodes[i+1];
      d+=curve(a.x,a.y,b.x,b.y)+" ";}
    spine.attr("d",d);
  }
}

/* ====== park/unpark ====== */
function park(n){n._vis=false;n.fx=-6000;n.fy=-6000;}
function show(n){if(!n._vis){n._vis=true;n.fx=null;n.fy=null;if(!(n.x>0)){n.x=W/2;n.y=bands[n.band]?bands[n.band].cy:0;}}}

/* ====== refresh ====== */
function refresh(){
  ACTIVE = MODE==="all"?BANDS.slice():BANDS.filter(b=>b!=="status");
  layoutBands();drawBands();
  // aggregate nodes
  const maxBy={};
  NODES.forEach(n=>{
    if(n.band==="proposta")return;
    const [tot,cl]=countFor(n);n._val=tot;n._cl=cl;
    if(ACTIVE.includes(n.band)&&tot>0)show(n);else park(n);
  });
  FB.concat(MODE==="all"?["status"]:[]).forEach(b=>{maxBy[b]=d3.max(NODES.filter(n=>n.band===b&&n._vis).map(n=>n._val))||1;});
  NODES.forEach(n=>{
    if(n.band==="proposta"||!n._vis)return;
    if(MODE==="all"){n._frac=n._val?n._cl/n._val:0;n._barc=tier(n._frac);}
    else{n._frac=n._val/(maxBy[n.band]||1);n._barc=n.color;}
  });
  // propostas
  const showProps=!!anyFacet();
  DATA.propostas.forEach(p=>{const nd=nodeById.get(p.id);
    if(showProps&&propMatch(p,null))show(nd);else park(nd);});
  // active facets highlight + spine
  spineNodes=[];
  if(MODE!=="all")spineNodes.push(null); // status via tabs (sem nó)
  FB.forEach(b=>{if(facets[b]){const nd=nodeById.get(facets[b]);if(nd&&nd._vis)spineNodes.push(nd);}});
  spineNodes=spineNodes.filter(Boolean).sort((a,b)=>BANDS.indexOf(a.band)-BANDS.indexOf(b.band));
  applyVisuals();
  spine.style("display",spineNodes.length>1?null:"none");
  plink.style("display",p=>p.s._vis?null:"none");
  sim.force("y",d3.forceY(d=>bands[d.band]?bands[d.band].cy:0).strength(.6));
  sim.force("collide",d3.forceCollide(d=>d._vis?d.cr:0).strength(1));
  sim.alpha(.8).restart();
  updateDetail();
}
function applyVisuals(){
  node.style("display",d=>d._vis?null:"none");
  node.select(".cnt").text(d=>d.band==="proposta"?"":d._val);
  node.select(".fill").attr("width",d=>trackW(d)*Math.max(0,Math.min(1,d._frac||0))).attr("fill",d=>d._barc||d.color);
  node.classed("active",d=>(FB.includes(d.band)&&facets[d.band]===d.id));
  node.classed("dim",false);
}

/* ====== interaction ====== */
function clickNode(n){
  if(n.band==="proposta"){selProp=(selProp===n.id?null:n.id);updateDetail();return;}
  if(n.band==="status"){const m=n.id==="S:Fechada"?"closed":"open";MODE=(MODE===m?"all":m);syncTabs();selProp=null;refresh();return;}
  facets[n.band]=(facets[n.band]===n.id)?null:n.id;
  selProp=null;refresh();
}
function clearAll(){FB.forEach(b=>facets[b]=null);selProp=null;refresh();}
svg.on("click",clearAll);
function syncTabs(){document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x.dataset.m===MODE));}
document.querySelectorAll("#seg button").forEach(b=>b.addEventListener("click",()=>{MODE=b.dataset.m;syncTabs();selProp=null;refresh();}));
window.removeFacet=function(b){facets[b]=null;selProp=null;refresh();};
window.setMode=function(m){MODE=m;syncTabs();selProp=null;refresh();};

/* ====== detail (top) ====== */
const dbody=document.getElementById("d-body");
function matchStats(){
  let s=0,c=0;for(const p of DATA.propostas)if(propMatch(p,null)){s++;if(p.fech)c++;}
  return [s,c];
}
function updateDetail(){
  if(selProp){showProp(nodeById.get(selProp).p);return;}
  if(!anyFacet()&&MODE==="all"){idleDetail();return;}
  // facet summary
  let chips="";
  if(MODE!=="all")chips+=`<span class="chip" style="border-color:${MODE==="closed"?"#34d399":"#f87171"}"><span class="gl" style="color:${MODE==="closed"?"#34d399":"#f87171"}">STATUS</span>${MODE==="closed"?"Fechadas":"Não fechadas"}<span class="x" onclick="setMode('all')">×</span></span>`;
  FB.forEach(b=>{if(facets[b]){const nd=nodeById.get(facets[b]);
    chips+=`<span class="chip" title="${nd.label}" style="border-color:${nd.color}"><span class="gl" style="color:${nd.color}">${BANDMETA[b].label}</span>${nd.label}<span class="x" onclick="removeFacet('${b}')">×</span></span>`;}});
  if(!chips)chips=`<span style="color:var(--dim);font-size:12px">nenhum filtro</span>`;
  const [s,c]=matchStats();const r=s?Math.round(c/s*100):0,col=tier(s?c/s:0);
  // breakdown: clientes da interseção
  const cliCounts={};
  for(const p of DATA.propostas)if(propMatch(p,null))cliCounts[p.cli]=(cliCounts[p.cli]||0)+1;
  const cliPills=Object.entries(cliCounts).sort((a,b)=>b[1]-a[1]).map(([id,n])=>{const nd=nodeById.get(id);
    return `<span class="p-pill" onclick="clickById('${id.replace(/'/g,"\\'")}')"><span class="dot" style="background:${nd.color}"></span>${nd.label}<span class="pw">${n}</span></span>`;}).join("");
  dbody.innerHTML=`<div class="d-close" onclick="clearAll()">×</div>
    <div class="d-row">
      <div class="d-left">
        <div class="d-chips"><div class="t">Seleção (cruzada)</div><div class="chips">${chips}</div></div>
        <div class="d-stats">
          <div class="stat"><div class="n">${s}</div><div class="l">Propostas</div></div>
          <div class="stat"><div class="n" style="color:${col}">${c}</div><div class="l">Fechadas</div></div>
          <div class="stat"><div class="n" style="color:${col}">${r}%</div><div class="l">Conversão</div></div>
        </div>
      </div>
      <div class="d-conn"><div class="hd">Clientes nessa seleção  ·  ↓ propostas na banda de baixo</div>
        <div class="d-pills"><div class="d-grp">${cliPills||'<span style="color:var(--dim);font-size:12px">nenhuma proposta bate com esse cruzamento</span>'}</div></div></div>
    </div>`;
  document.getElementById("detail").style.borderBottomColor="#7dd3fc";
}
function showProp(p){
  const cli=nodeById.get(p.cli),cid=nodeById.get(p.cid),dep=nodeById.get(p.dept),es=nodeById.get(p.esc);
  const stColor=p.fech?"#34d399":"#f87171",stTxt=p.fech?"Fechada":"Não fechada";
  dbody.innerHTML=`<div class="d-close" onclick="clearProp()">×</div>
    <div class="d-row">
      <div class="d-left">
        <div class="d-chips"><div class="t" style="color:#7dd3fc">Nº PROPOSTA</div>
          <div style="font-size:20px;font-weight:800">${p.num}</div>
          <div style="font-size:12px;font-weight:700;color:${stColor}">${stTxt}</div></div>
      </div>
      <div class="d-conn"><div class="hd">Detalhes da proposta</div>
        <div class="d-pills">
          <span class="p-pill" onclick="clickById('${p.cli.replace(/'/g,"\\'")}')"><span class="dot" style="background:${cli.color}"></span>${cli.label}</span>
          <span class="p-pill" onclick="clickById('${p.cid.replace(/'/g,"\\'")}')"><span class="dot" style="background:${cid.color}"></span>${cid.label}</span>
          <span class="p-pill" onclick="clickById('${p.dept.replace(/'/g,"\\'")}')"><span class="dot" style="background:${dep.color}"></span>${dep.label}</span>
          <span class="p-pill" title="${es.label}" style="max-width:520px;white-space:normal"><span class="dot" style="background:#fbbf24"></span>${es.label}</span>
        </div></div>
    </div>`;
  document.getElementById("detail").style.borderBottomColor="#7dd3fc";
}
function idleDetail(){
  dbody.innerHTML=`<div class="d-idle">
     <div><div class="big">Clique nas pílulas para cruzar filtros</div>
       <div style="margin-top:4px">Ex: clique num <b style="color:#fbbf24">escopo</b> e depois numa <b style="color:#22d3ee">cidade</b> → vê só o que bate nos dois, e as propostas abrem embaixo</div></div>
     <div class="lg"><span style="color:var(--dim)">número = volume</span><span style="color:var(--dim)">·</span><span style="color:var(--dim)">barra = conversão:</span>
       <span class="it"><span class="sw" style="background:var(--hi)"></span>≥45%</span>
       <span class="it"><span class="sw" style="background:var(--mid)"></span>30–45%</span>
       <span class="it"><span class="sw" style="background:var(--lo)"></span>&lt;30%</span></div></div>`;
  document.getElementById("detail").style.borderBottomColor="var(--line)";
}
window.clickById=function(id){clickNode(nodeById.get(id));};
window.clearProp=function(){selProp=null;updateDetail();};

/* ====== search ====== */
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  node.classed("dim",d=>q?!(d._vis&&d.label.toLowerCase().includes(q)):false);
});
window.addEventListener("resize",()=>{W=graphEl.clientWidth;layoutBands();drawBands();
  sim.force("x",d3.forceX(W/2).strength(.02));sim.alpha(.4).restart();});

refresh();
</script>
</body>
</html>
